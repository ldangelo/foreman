# Medium workflow: one implementation lane and one validation lane.
# Intended for tasks that need a bit of exploration and independent verification
# without the full pipeline overhead.
name: medium
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules

phases:
  - name: developer
    action: prompt-agent
    prompt: developer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 55
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: documentation
    action: prompt-agent
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: qa
    action: prompt-agent
    prompt: qa.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 20
    artifact: "{task.projectReportsDir}/QA_REPORT.md"
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: finalize
    action: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    verdict: true
    retryWith: developer
    retryOnFail: 6
    mail:
      onStart: true
      onComplete: true
      onFail: developer
