# Small workflow: one primary implementation lane plus finalize.
# Intended for local/narrow tasks where handoff overhead dominates.
name: small
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules

phases:
  - name: developer
    action: prompt-agent
    prompt: developer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    contract:
      policy:
        requiresExplorerReport: true
        developerCompletion: true
        acceptanceCoverage: true
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: documentation
    action: prompt-agent
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: finalize
    action: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    contract:
      policy:
        finalizeValidation: true
        skipDeveloperRetryOnUnrelatedFinalizeFailure: true
        terminalOnFailExhausted: true
    verdict: true
    retryWith: developer
    retryOnFail: 6
    mail:
      onStart: true
      onComplete: true
      onFail: developer
