# Default workflow: Explorer → Developer ⇄ QA → Reviewer → Finalize
#
# This is the standard Foreman pipeline. All bead types except "smoke" use
# this workflow unless overridden by a `workflow:<name>` label.
#
# Models map keys: "default" (required), "P0"–"P4" (optional priority overrides).
# Priority P0 = critical, P4 = backlog. Shorthands: haiku, sonnet, opus.
#
# Optional: specify VCS backend for this workflow.
# Overrides project-level .foreman/config.yaml if set.
# Values: 'auto' (detect from repo), 'git', 'jujutsu'.
# When absent, project config or auto-detection is used.
#
# vcs:
#   backend: auto
name: default
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
rebaseAfterPhase: developer

phases:
  - name: explorer
    prompt: explorer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 12
    artifact: "{task.projectReportsDir}/EXPLORER_REPORT.md"
    skipIfArtifact: EXPLORER_REPORT.md
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: developer

  - name: test-red
    prompt: test-red.md
    tools:
      allowed: [Bash, Edit, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 80
    retryAfterCooldown: true
    retryOnFail: 2
    artifact: "{task.projectReportsDir}/RED_REPORT.md"
    contract:
      requiredSections: [Verdict, Test Scope, Acceptance Contract Coverage, Expected Failure Evidence, Files Changed, Non-Test Files Changed, QA-Test Review Handoff]
      completion:
        requireFilesChanged: true
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 35
      maxToolCalls: 120
      repeatedCommandLimit: 2
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: test-review

  - name: test-review
    prompt: test-review.md
    tools:
      allowed: [Bash, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 30
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/TEST_REVIEW_REPORT.md"
    contract:
      requiredSections: [Verdict, Acceptance Contract, Red Failure Verification, Test Quality Findings, Implementation Handoff]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 20
      maxToolCalls: 30
      repeatedCommandLimit: 2
    verdict: true
    retryWith: test-red
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: test-red
      forwardArtifactTo: developer

  - name: developer
    prompt: developer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 50
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: qa
    prompt: qa.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 60
    artifact: "{task.projectReportsDir}/QA_REPORT.md"
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    prompt: reviewer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 50
    artifact: "{task.projectReportsDir}/REVIEW.md"
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    verdict: true
    retryWith: developer
    retryOnFail: 6
    mail:
      onStart: true
      onComplete: true
      onFail: developer
onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: MiniMax
    P0: MiniMax-highspeed
  maxTurns: 20
  artifact: "{task.projectReportsDir}/TROUBLESHOOT_REPORT.md"
