# Feature workflow: Explorer → Developer ⇄ QA → Reviewer → Finalize
#
# Full feature development pipeline. Identical to the default workflow but
# explicitly selects this workflow when task type is "feature".
#
# Models map keys: "default" (required), "P0"–"P4" (optional priority overrides).
# Priority P0 = critical, P4 = backlog. Shorthands: haiku, sonnet, opus.

name: feature
merge: auto
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
rebaseAfterPhase: developer

phases:
  - name: explorer
    prompt: explorer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 12
    artifact: "{task.projectReportsDir}/EXPLORER_REPORT.md"
    skipIfArtifact: EXPLORER_REPORT.md
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: developer

  - name: developer
    prompt: developer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 60
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: qa
    prompt: qa.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 60
    artifact: "{task.projectReportsDir}/QA_REPORT.md"
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    prompt: reviewer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 50
    artifact: "{task.projectReportsDir}/REVIEW.md"
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: MiniMax
    P0: MiniMax-highspeed
  maxTurns: 20
  artifact: "{task.projectReportsDir}/TROUBLESHOOT_REPORT.md"
