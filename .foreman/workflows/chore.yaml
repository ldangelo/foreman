# Chore workflow: command phase → bash phase → finalize → auto-merge
#
# Lean pipeline for refactors, dependency updates, tooling, and other
# maintenance tasks. Uses command + bash phases for efficiency (TRD-2026-008).
# No explorer (scope is already known) and no reviewer (changes are well-scoped).
#
# Auto-selected when task type is "chore".

name: chore
merge: auto
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules

phases:
  # ── Phase 1: fix (command phase — TRD-005) ───────────────────────────────
  # Uses /ensemble:fix-issue as the agent prompt, with task metadata interpolated.
  # Use /ensemble:refactor or /ensemble:chore for refactoring-specific agents.
  - name: fix
    command: "/ensemble:fix-issue {task.title} {task.description}"
    models:
      default: sonnet
      P0: opus
      P4: haiku
    maxTurns: 60
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    mail:
      onStart: true
      onComplete: true

  # ── Phase 2: test (bash phase — TRD-004) ────────────────────────────────
  # Runs the project's test suite to validate the chore.
  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: test
    bash: "npm run test"
    artifact: "{task.projectReportsDir}/TEST_RESULTS.md"
    verdict: true
    retryWith: fix
    retryOnFail: 2
    mail:
      onStart: false
      onComplete: true

  # ── Phase 3: finalize ───────────────────────────────────────────────────
  # Summarises changes for auto-merge.
  - name: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
