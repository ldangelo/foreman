# Task workflow: fix prompt → developer remediation → validation → finalize → auto-merge
#
# Standard task pipeline. Slightly lighter than feature: skips dedicated
# explorer/reviewer phases. Appropriate for well-scoped implementation tasks,
# improvements, and non-feature work that still benefits from validation.
#
# Auto-selected when task type is "task".

name: task
merge: auto
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
rebaseAfterPhase: developer

phases:
  # ── Phase 1: fix ────────────────────────────────────────────────────────
  # Uses the workflow-scoped fix-issue prompt so the artifact contract is
  # explicit and isolated from other workflows.
  - name: fix
    prompt: fix-issue.md
    tools:
      allowed:
        [
          Agent,
          Bash,
          Edit,
          Glob,
          Grep,
          Read,
          TaskOutput,
          TaskStop,
          TodoWrite,
          WebFetch,
          WebSearch,
          Write,
        ]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 180
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    mail:
      onStart: true
      onComplete: true

  # ── Retry-only: developer remediation ──────────────────────────────────
  # Retry target for QA/finalize/PR-review findings. Skipped during normal
  # sequential execution; activated only when a later phase fails and uses
  # retryWith: developer.
  - name: developer
    retryOnly: true
    prompt: developer.md
    tools:
      allowed:
        [
          Agent,
          Bash,
          Edit,
          Glob,
          Grep,
          Read,
          TaskOutput,
          TaskStop,
          TodoWrite,
          WebFetch,
          WebSearch,
          Write,
        ]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 180
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: qa
    prompt: qa.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 60
    artifact: "{task.projectReportsDir}/QA_REPORT.md"
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    prompt: reviewer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 80
    artifact: "{task.projectReportsDir}/REVIEW.md"
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  # ── Phase 3: cli-review (builtin) ───────────────────────────────────────
  - name: cli-review
    builtin: true
    artifact: "{task.projectReportsDir}/CR_CLI_REPORT.md"
    timeoutSecs: 600
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  # ── Phase 4: finalize (prompt phase) ───────────────────────────────────
  # Standard finalize with human-readable summary for auto-merge context.
  - name: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
  - name: create-pr
    builtin: true
    artifact: "{task.projectReportsDir}/PR_METADATA.json"
    mail:
      onStart: true
      onComplete: true

  - name: pr-wait
    builtin: true
    artifact: "{task.projectReportsDir}/PR_WAIT_REPORT.md"
    timeoutSecs: 1200
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: prepare-pr-review
    builtin: true
    artifact: "{task.projectReportsDir}/PR_REVIEW_FINDINGS.md"
    mail:
      onStart: true
      onComplete: true

  - name: pr-review
    prompt: pr-review.md
    tools:
      allowed: [Bash, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
    maxTurns: 40
    artifact: "{task.projectReportsDir}/PR_REVIEW_REPORT.md"
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: merge
    builtin: true
    artifact: "{task.projectReportsDir}/MERGE_REPORT.md"
    mail:
      onStart: true
      onComplete: true
onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: MiniMax
    P0: MiniMax-highspeed
  maxTurns: 20
  artifact: "{task.projectReportsDir}/TROUBLESHOOT_REPORT.md"
