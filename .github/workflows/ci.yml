name: CI

on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foreman
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d foreman"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/foreman

    strategy:
      matrix:
        node-version: ["20"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@foreman.dev"
          git config --global user.name "Foreman CI"
          git config --global init.defaultBranch main

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Write repo .env for integration tests
        run: |
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > .env

      - name: Run database migrations
        run: npm run db:migrate

      - name: Run CI tests
        run: npm run test:ci
