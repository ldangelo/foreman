name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@foreman.dev"
          git config --global user.name "Foreman CI"
          git config --global init.defaultBranch main

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-${{ matrix.node-version }}-
            npm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run PR-required test lanes
        run: npm run test:ci

      - name: Generate JSON test reports
        run: npm run test:report:ci

      - name: Upload PR-required test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-node-${{ matrix.node-version }}
          path: .foreman/test-reports/
          retention-days: 7
