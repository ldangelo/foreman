# Feature workflow: Explorer → Developer ⇄ QA → Reviewer → Finalize
#
# Full feature development pipeline. Identical to the default workflow but
# explicitly selects this workflow when bead type is "feature".
#
# Models map keys: "default" (required), "P0"–"P4" (optional priority overrides).
# Priority P0 = critical, P4 = backlog. Shorthands: haiku, sonnet, opus.

name: feature
merge: auto
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
phases:
  - name: explorer
    prompt: explorer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 20
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/EXPLORER_REPORT.md"
    contract:
      requiredSections: [Summary, Likely edit targets, Test targets, Risks]
      completion:
        minEditTargets: 1
        maxEditTargets: 3
        requireTestTargets: true
      allowedScope:
        canWriteOnly: [EXPLORER_REPORT.md, SESSION_LOG.md]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      maxSteersPerPhase: 3
      forceArtifactAfterSteers: 2
      forceArtifactAfterToolCalls: 10
      maxToolCalls: 20
      repeatedCommandLimit: 2
    skipIfArtifact: "{task.projectReportsDir}/EXPLORER_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: developer

  - name: developer
    prompt: developer.md
    tools:
      allowed: [Bash, Edit, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 60
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    contract:
      requiredSections: [Approach, Explorer Plan Followed, Files Changed, Extra Files Inspected, QA Handoff, Decisions, Known Limitations]
      completion:
        requireFilesChanged: true
        requireValidationNotes: true
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 35
      maxToolCalls: 50
      repeatedCommandLimit: 2
      blockedCommands:
        - "(^|\\s)(npm|pnpm|yarn)\\s+(test|vitest)\\b"
        - "(^|\\s)npx\\s+vitest\\b"
        - "(^|\\s)mix\\s+test\\b"
        - "(^|\\s)cargo\\s+test\\b"
        - "(^|\\s)go\\s+test\\b"
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: qa
    prompt: qa.md
    tools:
      allowed: [Bash, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 60
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/QA_REPORT.md"
    contract:
      requiredSections: [Verdict, Test Results, Changed Files Reviewed, Issues Found, Files Modified]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 30
      maxToolCalls: 45
      repeatedCommandLimit: 2
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    prompt: reviewer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/REVIEW.md"
    contract:
      requiredSections: [Verdict, Summary, Issues]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 20
      maxToolCalls: 30
      repeatedCommandLimit: 2
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: cli-review
    builtin: true
    artifact: "{task.projectReportsDir}/CR_CLI_REPORT.md"
    timeoutSecs: 600
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    contract:
      requiredSections: [Verdict, Documentation Updated, Documentation Not Needed, Checks]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 20
      maxToolCalls: 30
      repeatedCommandLimit: 2
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: create-pr
    builtin: true
    artifact: "{task.projectReportsDir}/PR_METADATA.json"
    mail:
      onStart: true
      onComplete: true

  - name: pr-wait
    builtin: true
    artifact: "{task.projectReportsDir}/PR_WAIT_REPORT.md"
    timeoutSecs: 1200
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: prepare-pr-review
    builtin: true
    artifact: "{task.projectReportsDir}/PR_REVIEW_FINDINGS.md"
    mail:
      onStart: true
      onComplete: true

  - name: pr-review
    prompt: pr-review.md
    tools:
      allowed: [Bash, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
    maxTurns: 40
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/PR_REVIEW_REPORT.md"
    contract:
      requiredSections: [Verdict, Findings Reviewed, Actions Taken, Validation, Remaining Blocking Items]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 20
      maxToolCalls: 30
      repeatedCommandLimit: 2
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: merge
    builtin: true
    artifact: "{task.projectReportsDir}/MERGE_REPORT.md"
    mail:
      onStart: true
      onComplete: true

onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: MiniMax
    P0: MiniMax-highspeed
  maxTurns: 20
  retryAfterCooldown: true
  artifact: "{task.projectReportsDir}/TROUBLESHOOT_REPORT.md"
