# Feature workflow: Explorer → Developer ⇄ QA → Reviewer → Finalize
#
# Full feature development pipeline. Identical to the default workflow but
# explicitly selects this workflow when bead type is "feature".
#
# Models map keys: "default" (required), "P0"–"P4" (optional priority overrides).
# Priority P0 = critical, P4 = backlog. Shorthands: haiku, sonnet, opus.

name: feature
merge: auto
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
rebaseAfterPhase: developer

phases:
  - name: explorer
    prompt: explorer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 30
    artifact: EXPLORER_REPORT.md
    skipIfArtifact: EXPLORER_REPORT.md
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: developer

  - name: developer
    prompt: developer.md
    tools:
      allowed: [Agent, Bash, Edit, Glob, Grep, Read, TaskOutput, TaskStop, TodoWrite, WebFetch, WebSearch, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 80
    artifact: DEVELOPER_REPORT.md
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: qa
    prompt: qa.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 30
    artifact: QA_REPORT.md
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    prompt: reviewer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 20
    artifact: REVIEW.md
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: finalize
    prompt: finalize.md
    tools:
      allowed: [Bash, Glob, Grep, Read, Write]
    models:
      default: MiniMax
    maxTurns: 30
    artifact: FINALIZE_VALIDATION.md
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: create-pr
    builtin: true
    artifact: PR_METADATA.json
    mail:
      onStart: true
      onComplete: true

  - name: pr-wait
    builtin: true
    artifact: PR_WAIT_REPORT.md
    timeoutSecs: 1200
    mail:
      onStart: true
      onComplete: true

  - name: prepare-pr-review
    builtin: true
    artifact: PR_REVIEW_FINDINGS.md
    mail:
      onStart: true
      onComplete: true

  - name: pr-review
    prompt: pr-review.md
    tools:
      allowed: [Bash, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
    maxTurns: 40
    artifact: PR_REVIEW_REPORT.md
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: MiniMax
    P0: MiniMax-highspeed
  maxTurns: 20
  artifact: TROUBLESHOOT_REPORT.md
