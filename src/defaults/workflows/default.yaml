# Default workflow: Explorer → Developer ⇄ QA → Reviewer → Finalize
#
# This is the standard Foreman pipeline. All bead types except "smoke" use
# this workflow unless overridden by a `workflow:<name>` label.
#
# Models map keys: "default" (required), "P0"–"P4" (optional priority overrides).
# Priority P0 = critical, P4 = backlog. Shorthands: haiku, sonnet, opus.
#
# Optional: specify VCS backend for this workflow.
# Overrides the global ~/.foreman/config.yaml setting if set.
# Values: 'auto' (detect from repo), 'git', 'jujutsu'.
# When absent, project config or auto-detection is used.
#
# vcs:
#   backend: auto
name: default
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
rebaseAfterPhase: developer

phases:
  - name: explorer
    prompt: explorer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 30
    artifact: EXPLORER_REPORT.md
    skipIfArtifact: EXPLORER_REPORT.md
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: developer

  - name: developer
    prompt: developer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 80
    artifact: DEVELOPER_REPORT.md
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: qa
    prompt: qa.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 30
    artifact: QA_REPORT.md
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    prompt: reviewer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 20
    artifact: REVIEW.md
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: finalize
    prompt: finalize.md
    models:
      default: MiniMax
    maxTurns: 30
    artifact: FINALIZE_VALIDATION.md
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  # ── PR Review Gate ────────────────────────────────────────────────────────
  # Explicit PR review workflow: create PR, wait for checks/CoderRabbit,
  # prepare review findings, then AI review with verdict. Merge is gated on
  # the pr-review verdict (PASS = merge, FAIL = stop).
  #
  # Artifact chain:
  #   PR_METADATA.json → PR_WAIT_REPORT.md → PR_REVIEW_FINDINGS.md → PR_REVIEW_REPORT.md

  - name: create-pr
    prompt: create-pr.md
    models:
      default: MiniMax
    maxTurns: 15
    artifact: docs/reports/{task.id}/PR_METADATA.json
    mail:
      onStart: true
      onComplete: true

  - name: pr-wait
    prompt: pr-wait.md
    models:
      default: MiniMax
    maxTurns: 40
    artifact: docs/reports/{task.id}/PR_WAIT_REPORT.md
    mail:
      onStart: true
      onComplete: true

  - name: prepare-pr-review
    prompt: prepare-pr-review.md
    models:
      default: MiniMax
    maxTurns: 20
    artifact: docs/reports/{task.id}/PR_REVIEW_FINDINGS.md
    mail:
      onStart: true
      onComplete: true

  - name: pr-review
    prompt: pr-review.md
    models:
      default: MiniMax
      P0: MiniMax
    maxTurns: 30
    artifact: docs/reports/{task.id}/PR_REVIEW_REPORT.md
    verdict: true
    retryWith: prepare-pr-review
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: MiniMax
    P0: MiniMax-highspeed
  maxTurns: 20
  artifact: TROUBLESHOOT_REPORT.md
