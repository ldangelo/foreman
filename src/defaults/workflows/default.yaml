# Default workflow: Explorer → Developer ⇄ QA → Reviewer → Finalize
#
# This is the standard Foreman pipeline. All bead types except "smoke" use
# this workflow unless overridden by a `workflow:<name>` label.
#
# Models map keys: "default" (required), "P0"–"P4" (optional priority overrides).
# Priority P0 = critical, P4 = backlog. Shorthands: haiku, sonnet, opus.
#
# Optional: specify VCS backend for this workflow.
# Overrides project-level .foreman/config.yaml if set.
# Values: 'auto' (detect from repo), 'git', 'jujutsu'.
# When absent, project config or auto-detection is used.
#
# vcs:
#   backend: auto
name: default
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
# Mid-pipeline rebase is roadmap work. Do not enable `rebaseAfterPhase` in the
# shipped default workflow until loader/executor/store/status support lands end-to-end.
phases:
  - name: explorer
    prompt: explorer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 30
    artifact: EXPLORER_REPORT.md
    skipIfArtifact: EXPLORER_REPORT.md
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: developer

  - name: developer
    prompt: developer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 80
    artifact: DEVELOPER_REPORT.md
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: qa
    prompt: qa.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 30
    artifact: QA_REPORT.md
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    prompt: reviewer.md
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 20
    artifact: REVIEW.md
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: finalize
    prompt: finalize.md
    models:
      default: haiku
    maxTurns: 30
    artifact: FINALIZE_VALIDATION.md
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer

onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: MiniMax
    P0: MiniMax-highspeed
  maxTurns: 20
  artifact: TROUBLESHOOT_REPORT.md
