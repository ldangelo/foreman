# Default workflow: Explorer → Developer ⇄ QA → Reviewer → Finalize
#
# This is the standard Foreman pipeline. All bead types except "smoke" use
# this workflow unless overridden by a `workflow:<name>` label.
#
# Models map keys: "default" (required), "P0"–"P4" (optional priority overrides).
# Priority P0 = critical, P4 = backlog. Shorthands: haiku, sonnet, opus.
#
# Optional: specify VCS backend for this workflow.
# Overrides the global ~/.foreman/config.yaml setting if set.
# Values: 'auto' (detect from repo), 'git', 'jujutsu'.
# When absent, project config or auto-detection is used.
#
# vcs:
#   backend: auto
name: default
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
phases:
  - name: explorer
    prompt: explorer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 20
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/EXPLORER_REPORT.md"
    contract:
      requiredSections: [Summary, Likely edit targets, Test targets, Risks]
      completion:
        minEditTargets: 1
        maxEditTargets: 3
        requireTestTargets: true
      allowedScope:
        canWriteOnly: [EXPLORER_REPORT.md, SESSION_LOG.md]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      maxSteersPerPhase: 3
      forceArtifactAfterSteers: 2
      forceArtifactAfterToolCalls: 10
      maxToolCalls: 20
      repeatedCommandLimit: 2
    skipIfArtifact: EXPLORER_REPORT.md
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: developer

  - name: developer
    prompt: developer.md
    tools:
      allowed: [Bash, Edit, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 50
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    contract:
      requiredSections: [Approach, Explorer Plan Followed, Files Changed, Extra Files Inspected, QA Handoff, Decisions, Known Limitations]
      completion:
        requireFilesChanged: true
        requireValidationNotes: true
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 35
      maxToolCalls: 50
      repeatedCommandLimit: 2
      blockedCommands:
        - "(^|\\s)(npm|pnpm|yarn)\\s+(test|vitest)\\b"
        - "(^|\\s)npx\\s+vitest\\b"
        - "(^|\\s)mix\\s+test\\b"
        - "(^|\\s)cargo\\s+test\\b"
        - "(^|\\s)go\\s+test\\b"
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  - name: auto-smoke
    bash: |
      set -euo pipefail
      trap 'echo "## Verdict: FAIL"' ERR

      # ── 1. git diff --check: catch whitespace / blank-line errors ─────────
      echo "=== git diff --check ==="
      git diff --check || { echo "FAIL: whitespace errors in diff"; exit 1; }
      echo "PASS"

      # ── 2. Conflict-marker scan ───────────────────────────────────────────
      echo "=== conflict-marker scan ==="
      CONFLICTS=$(grep -r "^<<<<<<\|^======\|^>>>>>>" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.json" --include="*.yaml" --include="*.yml" . 2>/dev/null | head -20 || true)
      if [ -n "$CONFLICTS" ]; then
        echo "FAIL: conflict markers found:"
        echo "$CONFLICTS"
        exit 1
      fi
      echo "PASS"

      # ── 3. Check that DEVELOPER_REPORT.md exists ──────────────────────────
      echo "=== DEVELOPER_REPORT.md existence ==="
      REPORT_FILE="{task.projectReportsDir}/DEVELOPER_REPORT.md"
      if [ ! -f "$REPORT_FILE" ]; then
        echo "FAIL: $REPORT_FILE not found"
        exit 1
      fi
      echo "PASS"

      # ── 4. Targeted typecheck (when tsconfig.json exists) ───────────────
      echo "=== typecheck (tsc --noEmit) ==="
      if [ -f "tsconfig.json" ]; then
        TSC_OUTPUT=$(npx tsc --noEmit 2>&1 | head -30 || true)
        if [ -n "$TSC_OUTPUT" ]; then
          echo "FAIL: TypeScript errors detected:"
          echo "$TSC_OUTPUT"
          exit 1
        fi
        echo "PASS"
      else
        echo "SKIPPED (no tsconfig.json)"
      fi

      # ── 5. CLI --help for touched commands (from DEVELOPER_REPORT.md) ──────
      echo "=== CLI --help checks ==="
      if [ -f "$REPORT_FILE" ]; then
        # Extract CLI commands from Files Changed section
        CLI_COMMANDS=$(grep -E "(foreman|foremanctl|foreman-server)" "$REPORT_FILE" | grep -oE "foreman(-[a-z]+)+" | sort -u || true)
        if [ -n "$CLI_COMMANDS" ]; then
          for cmd in $CLI_COMMANDS; do
            echo "Checking: $cmd --help"
            if command -v "$cmd" &>/dev/null; then
              "$cmd" --help > /dev/null 2>&1 || { echo "FAIL: $cmd --help failed"; exit 1; }
              echo "  PASS"
            else
              echo "  SKIPPED (not in PATH)"
            fi
          done
        else
          echo "SKIPPED (no CLI commands claimed in report)"
        fi
      else
        echo "SKIPPED (no report file)"
      fi

      echo "=== ALL CHECKS PASSED ==="
      echo "## Verdict: PASS"
    artifact: "{task.projectReportsDir}/AUTO_SMOKE_REPORT.md"
    verdict: true
    timeoutSecs: 120
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: qa
    prompt: qa.md
    tools:
      allowed: [Bash, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 60
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/QA_REPORT.md"
    contract:
      requiredSections: [Verdict, Test Results, Changed Files Reviewed, Issues Found, Files Modified]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 30
      maxToolCalls: 45
      repeatedCommandLimit: 2
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    prompt: reviewer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 50
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/REVIEW.md"
    contract:
      requiredSections: [Verdict, Summary, Issues]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 20
      maxToolCalls: 30
      repeatedCommandLimit: 2
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: cli-review
    builtin: true
    artifact: "{task.projectReportsDir}/CR_CLI_REPORT.md"
    timeoutSecs: 600
    verdict: true
    retryWith: developer
    retryOnFail: 2
    # Enable cooldown retry: when cli-review fails with a rate limit (e.g. CodeRabbit CLI
    # "Rate limit exceeded"), the task is placed in cooldown state instead of being marked
    # failed. The dispatcher will not re-dispatch until the cooldown period (5 minutes) expires.
    retryAfterCooldown: true
    # Optional: customize cooldown duration (default is 300 seconds if not specified)
    # cooldownSeconds: 600
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    verdict: true
    retryWith: developer
    retryOnFail: 6
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    contract:
      requiredSections: [Verdict, Documentation Updated, Documentation Not Needed, Checks]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 20
      maxToolCalls: 30
      repeatedCommandLimit: 2
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: create-pr
    builtin: true
    artifact: "{task.projectReportsDir}/PR_METADATA.json"
    mail:
      onStart: true
      onComplete: true

  - name: pr-wait
    builtin: true
    artifact: "{task.projectReportsDir}/PR_WAIT_REPORT.md"
    timeoutSecs: 1200
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: prepare-pr-review
    builtin: true
    artifact: "{task.projectReportsDir}/PR_REVIEW_FINDINGS.md"
    mail:
      onStart: true
      onComplete: true

  - name: pr-review
    prompt: pr-review.md
    tools:
      allowed: [Bash, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
    maxTurns: 40
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/PR_REVIEW_REPORT.md"
    contract:
      requiredSections: [Verdict, Findings Reviewed, Actions Taken, Validation, Remaining Blocking Items]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 20
      maxToolCalls: 30
      repeatedCommandLimit: 2
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: merge
    builtin: true
    artifact: "{task.projectReportsDir}/MERGE_REPORT.md"
    mail:
      onStart: true
      onComplete: true

onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: MiniMax
    P0: MiniMax-highspeed
  maxTurns: 20
  retryAfterCooldown: true
  artifact: "{task.projectReportsDir}/TROUBLESHOOT_REPORT.md"
