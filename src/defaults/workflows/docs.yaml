# Docs workflow: develop → documentation → review/finalize → PR/merge
#
# Minimal pipeline for documentation changes — README, API docs, inline comments,
# examples, and guides. Verdict failures route to a focused retry-only repair
# phase so agents fix the reported assertion instead of reopening broad task scope.
#
# Auto-selected when task type is "docs".

name: docs
task_type: docs
setup: []
# No dependencies needed for docs-only changes

phases:
  # ── Phase 1: develop ────────────────────────────────────────────────────
  # The agent writes or updates documentation based on the task title/description.
  - name: develop
    prompt: developer.md
    tools:
      allowed: [Agent, Bash, Edit, Glob, Grep, Read, TaskOutput, TaskStop, TodoWrite, WebFetch, WebSearch, Write]
    models:
      default: sonnet
      P0: opus
      P4: haiku
    maxTurns: 500
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 300

  # ── Phase 2: cli-review ──────────────────────────────────────────────────
  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 500
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: repair
    prompt: repair.md
    retryOnly: true
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: sonnet
      P0: opus
      P4: haiku
    maxTurns: 200
    artifact: "{task.projectReportsDir}/FIX_REPORT.md"
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 300

  - name: cli-review
    builtin: true
    artifact: "{task.projectReportsDir}/CR_CLI_REPORT.md"
    timeoutSecs: 600
    verdict: true
    retryWith: repair
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: repair

  # ── Phase 3: finalize ───────────────────────────────────────────────────
  # Quick validation: verify docs build or lint, then auto-merge.
  - name: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 500
    verdict: true
    retryWith: repair
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: repair
  - name: create-pr
    builtin: true
    artifact: "{task.projectReportsDir}/PR_METADATA.json"
    mail:
      onStart: true
      onComplete: true

  - name: pr-wait
    builtin: true
    artifact: "{task.projectReportsDir}/PR_WAIT_REPORT.md"
    timeoutSecs: 1200
    retryWith: repair
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: repair


  - name: merge
    builtin: true
    artifact: "{task.projectReportsDir}/MERGE_REPORT.md"
    retryWith: repair
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: repair
