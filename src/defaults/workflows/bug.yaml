# Bug fix workflow: command phase → bash phase → finalize → auto-merge
#
# Demonstrates all three new features from TRD-2026-008:
#   - command: phase (fix) — sends an interpolated command to the agent
#   - bash: phase (test) — runs npm test with verdict parsing
#   - merge: auto — auto-merge on green CI
#
# Auto-selected when a bead has type "bug" (TRD-006 type-based dispatch).
# Use `workflow:` label to override, e.g. `workflow:smoke` for smoke workflow.

name: bug
merge: auto
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules

phases:
  # ── Phase 1: fix (command phase — TRD-005) ───────────────────────────────
  # Uses /ensemble:fix-issue as the agent prompt, with task metadata interpolated.
  # All other phase config (model, maxTurns, artifact, mail) works identically
  # to a prompt: phase.
  - name: fix
    command: "/ensemble:fix-issue {task.title} {task.description}"
    models:
      default: MiniMax
      P0: MiniMax
      P4: MiniMax
    maxTurns: 80
    artifact: DEVELOPER_REPORT.md
    mail:
      onStart: true
      onComplete: true

  # ── Phase 2: test (bash phase — TRD-004) ────────────────────────────────
  # Executes `npm run test` via /bin/sh -c in the worktree directory.
  # {task.*} placeholders are interpolated before execution.
  # Artifact is written from stdout; verdict is parsed from output.
  - name: test
    bash: "npm run test:unit"
    artifact: TEST_RESULTS.md
    verdict: true
    retryWith: fix
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true

  # ── Phase 3: finalize (prompt phase) ───────────────────────────────────
  # Standard finalize with human-readable summary for auto-merge context.
  - name: finalize
    prompt: finalize-bug.md
    models:
      default: MiniMax
    maxTurns: 30
    artifact: FINALIZE_REPORT.md
    verdict: true
    retryWith: fix
    retryOnFail: 1
    mail:
      onStart: false
      onComplete: true
