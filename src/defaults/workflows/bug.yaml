# Bug fix workflow: fix prompt → QA validation → developer remediation on failure → finalize → PR checks → auto-merge
#
# Lean bug-fix pipeline:
#   - fix prompt — workflow-scoped issue fixing prompt
#   - qa phase — validates the fix and writes QA_REPORT.md
#   - developer prompt — retry-only target for QA/review/finalize findings
#   - merge: auto — auto-merge on green CI and PR review
#
# Auto-selected when a bead has type "bug" (TRD-006 type-based dispatch).
# Use `workflow:` label to override, e.g. `workflow:smoke` for smoke workflow.

name: bug
merge: auto
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules

phases:
  # ── Phase 1: fix ────────────────────────────────────────────────────────
  # Uses the workflow-scoped fix-issue prompt so the artifact contract is
  # explicit and isolated from other workflows.
  - name: fix
    prompt: fix-issue.md
    tools:
      allowed: [Bash, Edit, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax
      P4: MiniMax
    maxTurns: 80
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    contract:
      requiredSections: [Approach, Explorer Plan Followed, Files Changed, Extra Files Inspected, QA Handoff, Decisions, Known Limitations]
      completion:
        requireFilesChanged: true
        requireValidationNotes: true
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 45
      maxToolCalls: 65
      repeatedCommandLimit: 2
      blockedCommands:
        - "(^|\\s)(npm|pnpm|yarn)\\s+(test|vitest)\\b"
        - "(^|\\s)npx\\s+vitest\\b"
        - "(^|\\s)mix\\s+test\\b"
        - "(^|\\s)cargo\\s+test\\b"
        - "(^|\\s)go\\s+test\\b"
    mail:
      onStart: true
      onComplete: true

  # ── Retry-only: developer remediation ──────────────────────────────────
  # Retry target for QA/finalize/PR-review findings. Skipped during normal
  # sequential execution; activated only when a later phase fails and uses
  # retryWith: developer.
  - name: developer
    retryOnly: true
    prompt: developer.md
    tools:
      allowed: [Bash, Edit, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax
      P4: MiniMax
    maxTurns: 120
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    contract:
      requiredSections: [Approach, Explorer Plan Followed, Files Changed, Extra Files Inspected, QA Handoff, Decisions, Known Limitations]
      completion:
        requireFilesChanged: true
        requireValidationNotes: true
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 35
      maxToolCalls: 50
      repeatedCommandLimit: 2
      blockedCommands:
        - "(^|\\s)(npm|pnpm|yarn)\\s+(test|vitest)\\b"
        - "(^|\\s)npx\\s+vitest\\b"
        - "(^|\\s)mix\\s+test\\b"
        - "(^|\\s)cargo\\s+test\\b"
        - "(^|\\s)go\\s+test\\b"
    mail:
      onStart: true
      onComplete: true
    files:
      reserve: true
      leaseSecs: 600

  # ── Phase 3: QA validation ──────────────────────────────────────────────
  - name: qa
    prompt: qa.md
    tools:
      allowed: [Bash, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax
      P4: MiniMax
    maxTurns: 60
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/QA_REPORT.md"
    contract:
      requiredSections: [Verdict, Test Results, Changed Files Reviewed, Issues Found, Files Modified]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 30
      maxToolCalls: 45
      repeatedCommandLimit: 2
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  # ── Phase 4: cli-review (builtin) ───────────────────────────────────────
  # Run CodeRabbit CLI before finalize so the developer remediation loop can
  # address findings before PR creation and merge gates.
  - name: cli-review
    builtin: true
    artifact: "{task.projectReportsDir}/CR_CLI_REPORT.md"
    timeoutSecs: 600
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  # ── Phase 5: finalize (prompt phase) ───────────────────────────────────
  # Standard finalize with human-readable summary for auto-merge context.
  # artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md" is what the pipeline reads for the validation
  # contract check (Target Integration / Test Validation sections + Verdict).
  # FINALIZE_REPORT.md is also written by the agent as a human-readable summary.
  - name: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    verdict: true
    retryWith: developer
    retryOnFail: 6
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    contract:
      requiredSections: [Verdict, Documentation Updated, Documentation Not Needed, Checks]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 20
      maxToolCalls: 30
      repeatedCommandLimit: 2
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: create-pr
    builtin: true
    artifact: "{task.projectReportsDir}/PR_METADATA.json"
    mail:
      onStart: true
      onComplete: true

  - name: pr-wait
    builtin: true
    artifact: "{task.projectReportsDir}/PR_WAIT_REPORT.md"
    timeoutSecs: 1200
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: prepare-pr-review
    builtin: true
    artifact: "{task.projectReportsDir}/PR_REVIEW_FINDINGS.md"
    mail:
      onStart: true
      onComplete: true

  - name: pr-review
    prompt: pr-review.md
    tools:
      allowed: [Bash, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
    maxTurns: 40
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/PR_REVIEW_REPORT.md"
    contract:
      requiredSections: [Verdict, Findings Reviewed, Actions Taken, Validation, Remaining Blocking Items]
    overwatch:
      enabled: true
      mode: enforce
      continueIfArtifactValidOnBudgetStop: true
      forceArtifactAfterToolCalls: 20
      maxToolCalls: 30
      repeatedCommandLimit: 2
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: merge
    builtin: true
    artifact: "{task.projectReportsDir}/MERGE_REPORT.md"
    mail:
      onStart: true
      onComplete: true
