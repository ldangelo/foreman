# Epic workflow: Skill-driven planning and implementation pipeline.
#
# When epic has child tasks (beads mode): iterates child tasks via taskPhases,
# then finalPhases once at the end.
#
# When epic has no children (native mode): runs skill phases directly as a
# single-agent pipeline:
#   prd → trd → implement → finalize
#
# Skill invocation: `command:` sends /ensemble:<skill-name> as the agent prompt.
# The Pi SDK agent recognizes skill invocations and loads the SKILL.md.

name: epic
onError: stop
taskTimeout: 300

setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules

# Per-task phases: run for each child task in the epic (beads mode)
taskPhases:
  - developer
  - qa

# Final phases: run once after all tasks complete (beads mode)
finalPhases:
  - finalize

phases:
  # ── Phase 1: PRD ──────────────────────────────────────────────────────────
  # Invoke /ensemble:create-prd using the epic's description as input.
  # Output: docs/PRD/<name>.md
  - name: prd
    command: "/ensemble:create-prd {task.title}"
    models:
      default: MiniMax
      P0: MiniMax
    maxTurns: 40
    artifact: PRD.md
    verdict: false
    mail:
      onStart: true
      onComplete: true

  # ── Phase 2: TRD ──────────────────────────────────────────────────────────
  # Invoke /ensemble:create-trd with the PRD path.
  # Output: docs/TRD/<name>.md
  - name: trd
    command: "/ensemble:create-trd"
    models:
      default: MiniMax
      P0: MiniMax
    maxTurns: 60
    artifact: TRD.md
    verdict: false
    retryWith: prd
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true

  # ── Phase 3: Implement ────────────────────────────────────────────────────
  # Invoke /ensemble:implement-trd with the TRD path.
  # Output: implemented code, tests, merged to target branch
  - name: implement
    command: "/ensemble:implement-trd"
    models:
      default: MiniMax
      P0: MiniMax
    maxTurns: 120
    artifact: IMPLEMENT_REPORT.md
    verdict: false
    retryWith: trd
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true

  # ── Phase 4: finalize ─────────────────────────────────────────────────────
  # Standard finalize: stage, commit, push, auto-merge.
  - name: finalize
    prompt: finalize.md
    models:
      default: haiku
    maxTurns: 30
    artifact: FINALIZE_VALIDATION.md
    verdict: true
    retryWith: implement
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true

onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: sonnet
    P0: opus
  maxTurns: 20
  artifact: TROUBLESHOOT_REPORT.md
