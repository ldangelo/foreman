# Epic workflow: Skill-driven planning and implementation pipeline.
#
# When epic has child tasks (beads mode): iterates child tasks via taskPhases,
# then finalPhases once at the end.
#
# When epic has no children (native mode): runs skill phases directly as a
# single-agent pipeline:
#   prd → trd → implement → developer → qa → finalize → create-pr → pr-wait → prepare-pr-review → pr-review → merge
#
# Skill invocation: `command:` sends /ensemble:<skill-name> as the agent prompt.
# The Pi SDK agent recognizes skill invocations and loads the SKILL.md.
#
# Artifact path conventions:
#   - PRD/TRD: docs/PRD/PRD-{yyyymm}-{title-slug}.md (project docs, committed)
#   - Phase reports: docs/reports/{seedId}/{REPORT}.md (execution reports, committed)
#
# skipIfArtifact: checked at phase start to skip if report already exists.

name: epic
onError: stop
taskTimeout: 300
merge: auto

setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules

# Per-task phases: run for each child task in the epic (beads mode)
taskPhases:
  - developer
  - qa

# Final phases: run once after all tasks complete (beads mode)
finalPhases:
  - finalize

phases:
  # ── Phase 1: PRD ──────────────────────────────────────────────────────────
  # PRD skill writes to docs/PRD/PRD-{yyyymm}-{title-slug}.md
  # skipIfArtifact checks for docs/PRD/PRD-{yyyymm}-{title-slug}.md (skill's output path)
  - name: prd
    command: "/skill:ensemble-create-prd {task.title}"
    tools:
      allowed: [Agent, Bash, Edit, Glob, Grep, Read, TaskOutput, TaskStop, TodoWrite, WebFetch, WebSearch, Write]
    models:
      default: MiniMax
      P0: MiniMax
    maxTurns: 40
    verdict: false
    mail:
      onStart: true
      onComplete: true

  # ── Phase 2: TRD ──────────────────────────────────────────────────────────
  # TRD skill writes to docs/TRD/TRD-{yyyymm}-{title-slug}.md
  # skipIfArtifact checks for docs/TRD/TRD-{yyyymm}-{title-slug}.md (skill's output path)
  - name: trd
    command: "/skill:ensemble-create-trd"
    tools:
      allowed: [Agent, Bash, Edit, Glob, Grep, Read, TaskOutput, TaskStop, TodoWrite, WebFetch, WebSearch, Write]
    models:
      default: MiniMax
      P0: MiniMax
    maxTurns: 60
    verdict: false
    retryWith: prd
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true

  # ── Phase 3: Implement ────────────────────────────────────────────────────
  # Implement skill writes an IMPLEMENT_REPORT.md to the current working directory.
  # Move it to the runtime report directory so it is not committed with the worktree.
  - name: implement
    command: "mkdir -p \"{task.projectReportsDir}\" && /skill:ensemble-implement-trd && mv IMPLEMENT_REPORT.md \"{task.projectReportsDir}/IMPLEMENT_REPORT.md\" 2>/dev/null || true"
    tools:
      allowed: [Agent, Bash, Edit, Glob, Grep, Read, TaskOutput, TaskStop, TodoWrite, WebFetch, WebSearch, Write]
    models:
      default: MiniMax
      P0: MiniMax
    maxTurns: 120
    artifact: "{task.projectReportsDir}/IMPLEMENT_REPORT.md"
    skipIfArtifact: "{task.projectReportsDir}/IMPLEMENT_REPORT.md"
    verdict: false
    retryWith: trd
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true

  # ── Phase 4: Developer (fix issues from finalize / qa) ──────────────────
  - name: developer
    prompt: developer.md
    tools:
      allowed: [Agent, Bash, Edit, Glob, Grep, Read, TaskOutput, TaskStop, TodoWrite, WebFetch, WebSearch, Write]
    models:
      default: MiniMax
      P0: MiniMax
    maxTurns: 80
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    verdict: false
    retryWith: implement
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true

  # ── Phase 5: QA ──────────────────────────────────────────────────────────
  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: qa
    prompt: qa.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
      P0: MiniMax
    maxTurns: 30
    artifact: "{task.projectReportsDir}/QA_REPORT.md"
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  # ── Phase 6: finalize ───────────────────────────────────────────────────
  - name: finalize
    prompt: finalize.md
    tools:
      allowed: [Bash, Glob, Grep, Read, Write]
    models:
      default: MiniMax
    maxTurns: 30
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: create-pr
    builtin: true
    artifact: "{task.projectReportsDir}/PR_METADATA.json"
    mail:
      onStart: true
      onComplete: true

  - name: pr-wait
    builtin: true
    artifact: "{task.projectReportsDir}/PR_WAIT_REPORT.md"
    timeoutSecs: 1200
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: prepare-pr-review
    builtin: true
    artifact: "{task.projectReportsDir}/PR_REVIEW_FINDINGS.md"
    mail:
      onStart: true
      onComplete: true

  - name: pr-review
    prompt: pr-review.md
    tools:
      allowed: [Bash, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
    maxTurns: 40
    artifact: "{task.projectReportsDir}/PR_REVIEW_REPORT.md"
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: merge
    builtin: true
    artifact: "{task.projectReportsDir}/MERGE_REPORT.md"
    mail:
      onStart: true
      onComplete: true

onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: sonnet
    P0: opus
  maxTurns: 20
  artifact: "{task.projectReportsDir}/TROUBLESHOOT_REPORT.md"
