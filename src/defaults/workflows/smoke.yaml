# Smoke workflow: lightweight pipeline using Haiku for all phases.
#
# Used when a bead has the `workflow:smoke` label or type "smoke".
# Designed for fast, low-cost validation — not for production tasks.
#
# Models map keys: "default" (required), "P0"–"P4" (optional priority overrides).
name: smoke
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
phases:
  - name: explorer
    prompt: explorer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: haiku
    maxTurns: 5
    artifact: EXPLORER_REPORT.md
    skipIfArtifact: EXPLORER_REPORT.md
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: developer

  - name: developer
    prompt: developer.md
    tools:
      allowed: [Agent, Bash, Edit, Glob, Grep, Read, TaskOutput, TaskStop, TodoWrite, WebFetch, WebSearch, Write]
    models:
      default: haiku
    maxTurns: 5
    artifact: DEVELOPER_REPORT.md
    mail:
      onStart: true
      onComplete: true

  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: DOCUMENTATION_REPORT.md
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: qa
    prompt: qa.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: haiku
    maxTurns: 5
    artifact: QA_REPORT.md
    verdict: true
    retryWith: developer
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    prompt: reviewer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: sonnet
    maxTurns: 5
    artifact: REVIEW.md
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: finalize
    prompt: finalize.md
    tools:
      allowed: [Bash, Glob, Grep, Read, Write]
    models:
      default: MiniMax
    maxTurns: 10
    artifact: FINALIZE_VALIDATION.md
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
