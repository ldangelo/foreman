# Smoke workflow: lightweight pipeline using Haiku for all phases.
#
# Used when a bead has the `workflow:smoke` label or type "smoke".
# Designed for fast, low-cost validation — not for production tasks.
#
# Models map keys: "default" (required), "P0"–"P4" (optional priority overrides).
name: smoke
task_type: smoke
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
phases:
  - name: prepare-worktree
    action: prepare-worktree

  - name: setup-workspace
    action: setup-workspace

  - name: write-task-context
    action: write-task-context

  - name: explorer
    action: prompt-agent
    prompt: explorer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: haiku
    maxTurns: 5
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/EXPLORER_REPORT.md"
    skipIfArtifact: EXPLORER_REPORT.md
    contract:
      policy:
        explorerCircuitBreaker: true
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: developer

  - name: developer
    action: prompt-agent
    prompt: developer.md
    tools:
      allowed: [Agent, Bash, Edit, Glob, Grep, Read, TaskOutput, TaskStop, TodoWrite, WebFetch, WebSearch, Write]
    models:
      default: haiku
    maxTurns: 5
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DEVELOPER_REPORT.md"
    contract:
      policy:
        requiresExplorerReport: true
        developerCompletion: true
        acceptanceCoverage: true
    mail:
      onStart: true
      onComplete: true

  - name: documentation
    action: prompt-agent
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: qa
    action: prompt-agent
    prompt: qa.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: haiku
    maxTurns: 5
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/QA_REPORT.md"
    contract:
      policy:
        acceptanceCoverage: true
        testEvidence: true
        captureQaTarget: true
        structuredFailureChecklist: true
        terminalOnFailExhausted: true
    verdict: true
    retryWith: developer
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: developer

  - name: reviewer
    action: prompt-agent
    prompt: reviewer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: sonnet
    maxTurns: 5
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/REVIEW.md"
    contract:
      policy:
        acceptanceCoverage: true
        structuredFailureChecklist: true
        terminalOnFailExhausted: true
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
      forwardArtifactTo: foreman

  - name: finalize
    action: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    contract:
      policy:
        finalizeValidation: true
        skipDeveloperRetryOnUnrelatedFinalizeFailure: true
        terminalOnFailExhausted: true
    verdict: true
    retryWith: developer
    retryOnFail: 6
    mail:
      onStart: true
      onComplete: true
      onFail: developer
