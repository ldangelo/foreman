# Task workflow: Explorer → Developer ⇄ QA → Finalize
#
# Standard task pipeline. Slightly lighter than feature: skips the dedicated
# reviewer phase. Appropriate for well-scoped implementation tasks, improvements,
# and non-feature work that still benefits from QA validation.
#
# Auto-selected when bead type is "task".

name: task
merge: auto
onError: stop
setup:
  - command: npm install --prefer-offline --no-audit
    description: Install Node.js dependencies
    failFatal: true
setupCache:
  key: package-lock.json
  path: node_modules
rebaseAfterPhase: developer

phases:
  - name: fix
    command: "/skill:ensemble-fix-issue {task.title} {task.description}"
    tools:
      allowed: [Agent, Bash, Edit, Glob, Grep, Read, TaskOutput, TaskStop, TodoWrite, WebFetch, WebSearch, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 80
    artifact: DEVELOPER_REPORT.md
    mail:
      onStart: true
      onComplete: true

  # ── Phase 2: test (bash phase — TRD-004) ────────────────────────────────
  # Executes `npm run test:unit` via /bin/sh -c in the worktree directory.
  # {task.*} placeholders are interpolated before execution.
  # Artifact is written from stdout; verdict is parsed from output.
  - name: test
    bash: "npm run test:unit"
    timeoutSecs: 180
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, TodoWrite, Write]
    artifact: TEST_RESULTS.md
    verdict: true
    retryWith: fix
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true

  # ── Phase 3: finalize (prompt phase) ───────────────────────────────────
  # Standard finalize with human-readable summary for auto-merge context.
  - name: finalize
    prompt: finalize.md
    tools:
      allowed: [Bash, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 30
    artifact: FINALIZE_VALIDATION.md
    verdict: true
    retryWith: fix
    retryOnFail: 1
    mail:
      onStart: false
      onComplete: true

  - name: create-pr
    builtin: true
    artifact: "{task.projectReportsDir}/PR_METADATA.json"
    mail:
      onStart: true
      onComplete: true

  - name: pr-wait
    builtin: true
    artifact: "{task.projectReportsDir}/PR_WAIT_REPORT.md"
    timeoutSecs: 1200
    retryWith: fix
    retryOnFail: 2
    mail:
      onStart: true
      onComplete: true
      onFail: fix

  - name: prepare-pr-review
    builtin: true
    artifact: "{task.projectReportsDir}/PR_REVIEW_FINDINGS.md"
    mail:
      onStart: true
      onComplete: true

  - name: pr-review
    prompt: pr-review.md
    tools:
      allowed: [Bash, Glob, Grep, Read, TodoWrite, Write]
    models:
      default: MiniMax
    maxTurns: 40
    artifact: "{task.projectReportsDir}/PR_REVIEW_REPORT.md"
    verdict: true
    retryWith: fix
    retryOnFail: 3
    mail:
      onStart: true
      onComplete: true
      onFail: fix
      forwardArtifactTo: foreman

  - name: merge
    builtin: true
    artifact: "{task.projectReportsDir}/MERGE_REPORT.md"
    mail:
      onStart: true
      onComplete: true
onFailure:
  name: troubleshooter
  prompt: troubleshooter.md
  models:
    default: MiniMax
    P0: MiniMax-highspeed
  maxTurns: 20
  artifact: TROUBLESHOOT_REPORT.md
