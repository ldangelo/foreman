# Question workflow: explore → finalize (no merge)
#
# Lightweight research/clarification pipeline for questions, spike investigations,
# proof-of-concepts, and architecture explorations. No code is merged — the agent
# produces a written answer/analysis as the artifact.
#
# Auto-selected when bead type is "question".

name: question
merge: none
setup: []
# No install needed for research-only tasks

phases:
  # ── Phase 1: explore ────────────────────────────────────────────────────
  # Investigate the question and produce a written analysis.
  - name: explore
    prompt: explorer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: sonnet
      P0: opus
      P4: haiku
    maxTurns: 30
    artifact: "{task.projectReportsDir}/EXPLORER_REPORT.md"
    mail:
      onStart: true
      onComplete: true

  # ── Phase 2: finalize ───────────────────────────────────────────────────
  # Summarise findings. No merge — merge_strategy is "none".
  - name: documentation
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    verdict: true
    retryWith: developer
    retryOnFail: 1
    mail:
      onStart: true
      onComplete: true
      onFail: developer
