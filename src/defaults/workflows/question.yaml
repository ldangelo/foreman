# Question workflow: explore → finalize (no merge)
#
# Lightweight research/clarification pipeline for questions, spike investigations,
# proof-of-concepts, and architecture explorations. No code is merged — the agent
# produces a written answer/analysis as the artifact.
#
# Auto-selected when bead type is "question".

name: question
task_type: question
merge: none
setup: []
# No install needed for research-only tasks

phases:
  - name: prepare-worktree
    action: prepare-worktree

  - name: setup-workspace
    action: setup-workspace

  - name: write-task-context
    action: write-task-context

  # ── Phase 1: explore ────────────────────────────────────────────────────
  # Investigate the question and produce a written analysis.
  - name: explore
    action: prompt-agent
    prompt: explorer.md
    tools:
      allowed: [Glob, Grep, Read, Write]
    models:
      default: sonnet
      P0: opus
      P4: haiku
    maxTurns: 30
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/EXPLORER_REPORT.md"
    mail:
      onStart: true
      onComplete: true

  # ── Phase 2: finalize ───────────────────────────────────────────────────
  # Summarise findings. No merge — merge_strategy is "none".
  - name: documentation
    action: prompt-agent
    prompt: documentation.md
    tools:
      allowed: [Bash, Edit, Glob, Grep, Read, Write]
    models:
      default: MiniMax
      P0: MiniMax-highspeed
    maxTurns: 40
    retryAfterCooldown: true
    artifact: "{task.projectReportsDir}/DOCUMENTATION_REPORT.md"
    mail:
      onStart: true
      onComplete: true
      forwardArtifactTo: foreman

  - name: finalize
    action: finalize
    builtin: true
    artifact: "{task.projectReportsDir}/FINALIZE_VALIDATION.md"
    maxTurns: 30
    contract:
      policy:
        finalizeValidation: true
        skipDeveloperRetryOnUnrelatedFinalizeFailure: true
        terminalOnFailExhausted: true
    verdict: true
    retryWith: explore
    retryOnFail: 6
    mail:
      onStart: true
      onComplete: true
      onFail: explore
