services:
  postgres:
    image: postgres:16-alpine
    container_name: foreman-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foreman}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-foreman}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - foreman-postgres-data:/var/lib/postgresql/data

volumes:
  foreman-postgres-data:
